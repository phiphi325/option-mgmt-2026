# Dependabot config.
# Per docs/engineering-principles.md (Simplicity — no unjustified deps),
# Dependabot keeps deps current. Reviewers must still apply the "no new dep
# without justification" rule when accepting Dependabot PRs that introduce
# transitive surface.

version: 2

updates:
  # ---- Python (apps/api) -----------------------------------------------
  - package-ecosystem: 'pip'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels:
      - 'deps'
      - 'python'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  # ---- Node (apps/web) -------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels:
      - 'deps'
      - 'javascript'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    # The Next.js pin is enforced by scripts/check_next_version.sh (per
    # plan v1.2 §22.1). Bumping next or eslint-config-next requires manually
    # updating both package.json and the script. Don't auto-PR them.
    #
    # Major-version bumps on the listed packages are deferred to Phase 1's
    # deliberate dep-update sweep (per v1.2 §17, post-M0.7). Each is a
    # breaking migration: vitest 2→4 changes config + reporter API; typescript
    # 5→6 affects strict-mode behavior; tailwindcss 3→4 is a full engine
    # rewrite; @vitejs/plugin-react 4→6 changes the Fast Refresh boundary;
    # @types/node major bumps should pair with the runtime Node bump in
    # apps/web/Dockerfile. Minor + patch updates remain auto-PR'd. Reopen
    # the relevant ignore line if a security advisory warrants emergency
    # action on a deferred package.
    ignore:
      - dependency-name: 'next'
      - dependency-name: 'eslint-config-next'
      - dependency-name: 'vitest'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
      - dependency-name: '@vitejs/plugin-react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  # ---- GitHub Actions (.github/workflows) ------------------------------
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'deps'
      - 'ci'
    commit-message:
      prefix: 'chore(ci)'

  # ---- Docker base images ---------------------------------------------
  - package-ecosystem: 'docker'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
    labels:
      - 'deps'
      - 'docker'

  - package-ecosystem: 'docker'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
    labels:
      - 'deps'
      - 'docker'
