# Dependabot config.
# Per docs/engineering-principles.md (Simplicity — no unjustified deps),
# Dependabot keeps deps current. Reviewers must still apply the "no new dep
# without justification" rule when accepting Dependabot PRs that introduce
# transitive surface.

version: 2

updates:
  # ---- Python (apps/api) -----------------------------------------------
  - package-ecosystem: 'pip'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels:
      - 'deps'
      - 'python'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  # ---- Node (apps/web) -------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    labels:
      - 'deps'
      - 'javascript'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    # The Next.js pin is enforced by scripts/check_next_version.sh (per
    # plan v1.2 §22.1). Bumping next or eslint-config-next requires manually
    # updating both package.json and the script. Don't auto-PR them.
    #
    # ALL major-version bumps on the npm ecosystem are deferred to Phase 1's
    # deliberate dep-update sweep (per v1.2 §17, post-M0.7). Every major
    # bump is a breaking migration that deserves its own focused PR with
    # tests + visual regression checking, not a Dependabot auto-merge.
    # Examples already encountered: vitest 2→4 (reporter API), typescript
    # 5→6 (strict-mode), tailwindcss 3→4 (engine rewrite), tailwind-merge
    # 2→3, eslint 9→10, jsdom 25→29, @vitejs/plugin-react 4→6, @types/node
    # 22→25 (should pair with runtime Node bump). Minor + patch updates
    # remain auto-PR'd. Drop the wildcard rule when Phase 1 begins.
    ignore:
      - dependency-name: 'next'
      - dependency-name: 'eslint-config-next'
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # ---- GitHub Actions (.github/workflows) ------------------------------
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'deps'
      - 'ci'
    commit-message:
      prefix: 'chore(ci)'

  # ---- Docker base images ---------------------------------------------
  - package-ecosystem: 'docker'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
    labels:
      - 'deps'
      - 'docker'

  - package-ecosystem: 'docker'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
    labels:
      - 'deps'
      - 'docker'
