# CI pipeline — runs on every PR and on push to main / staging.
#
# Per docs/engineering-principles.md (TDD + Observability + Pin discipline)
# and plan v1.2 §13 (Testing Strategy) / §14 (CI/CD).
#
# Job summary:
#   guards         pin checks (next, engine_version) + no-broker-import check
#   api            ruff + mypy --strict + pytest (apps/api)
#   engine         ruff + mypy --strict + pytest (packages/engine) + codegen drift check
#   web            eslint + tsc + vitest + next build + shared-types typecheck
#   smoke          end-to-end: real Postgres + alembic + uvicorn + httpx pytest
#
# Concurrency cancels stale runs on the same branch when new commits land.

name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  guards:
    name: Pin & policy guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need full history so check_engine_version_bump.sh can compare to the merge base.
          fetch-depth: 0

      - name: Check Next.js pin (per plan v1.2 §22.1)
        run: bash scripts/check_next_version.sh

      - name: Check no broker imports (per ADR-0001, plan v1.2 §15)
        run: bash scripts/check_no_broker_imports.sh

      - name: Check engine_version bump (per ADR-0005, plan v1.2 §22.15 L2)
        run: bash scripts/check_engine_version_bump.sh

  api:
    name: API (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            apps/api/pyproject.toml
            apps/api/uv.lock
            pyproject.toml

      - name: Install Python deps
        # uv reads apps/api/.python-version (3.14) and apps/api/pyproject.toml's
        # requires-python = ">=3.14" to select the interpreter. uv downloads
        # the toolchain if the runner doesn't have it. Per ADR-0007.
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: mypy --strict
        run: uv run mypy --strict app

      - name: pytest
        env:
          # Settings.jwt_secret has min_length=16; CI must satisfy it.
          JWT_SECRET: ci-jwt-secret-not-for-production
          # No live postgres in unit-test job — health endpoint reports 'degraded'.
          DATABASE_URL: postgresql+psycopg://postgres:dev@localhost:5432/msft_engine_test
        run: uv run pytest -q

  engine:
    name: Engine (ruff + mypy + pytest + codegen drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            packages/engine/pyproject.toml
            packages/engine/uv.lock
            pyproject.toml

      - name: Install engine deps
        working-directory: packages/engine
        # uv reads ../../.python-version (root) → 3.14. The engine package has
        # its own pyproject.toml and is a workspace member of the root uv config.
        run: uv sync --dev

      - name: Ruff lint
        working-directory: packages/engine
        run: uv run ruff check .

      - name: mypy --strict
        working-directory: packages/engine
        run: uv run mypy --strict engine

      - name: pytest
        working-directory: packages/engine
        run: uv run pytest -q

      - name: Coverage check (engine.scoring 100%)
        # Plan v1.2 §9.11 acceptance bar: scoring primitives ship at 100% line
        # coverage. M1.4a (iv/structure/event) is the first scoring module to
        # land; M1.5a (gamma) extends. The gate sits on the package, not on
        # individual files, so adding new scoring primitives keeps the same
        # CI step as long as their tests cover all lines.
        working-directory: packages/engine
        run: |
          uv run pytest -q \
            --cov=engine.scoring \
            --cov-fail-under=100 \
            --cov-report=term-missing

      - name: Shared-types codegen drift check
        working-directory: packages/engine
        # --check exits non-zero if packages/shared-types/src/*.ts is out of sync
        # with packages/engine/engine/{regimes,profiles,types}.py. Run the
        # generator without --check, commit the regenerated .ts to fix.
        run: uv run python ../shared-types/scripts/generate.py --check

  web:
    name: Web (eslint + tsc + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          # Workspace pnpm-lock.yaml lives at the repo root, NOT under apps/web
          # — a single workspace lockfile covers all apps/ + packages/ members.
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install workspace deps
        # Install from root so workspace deps (option-mgmt-shared-types) link correctly.
        # --frozen-lockfile fails if pnpm-lock.yaml doesn't match — drift detection.
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared-types
        working-directory: packages/shared-types
        run: pnpm typecheck

      - name: ESLint (apps/web)
        working-directory: apps/web
        run: pnpm lint

      - name: tsc --noEmit (apps/web)
        working-directory: apps/web
        run: pnpm typecheck

      - name: Vitest (apps/web)
        working-directory: apps/web
        run: pnpm test

      - name: Next build (smoke check)
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: pnpm build

  smoke:
    name: Smoke (e2e API)
    runs-on: ubuntu-latest
    # M0.7 cross-stack smoke test. Real Postgres (via GitHub services), real
    # alembic migration, real uvicorn process, real httpx client. Validates
    # that the deployment artifacts work end-to-end. Per plan v1.2 §17 M0.7.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: msft_engine
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d msft_engine"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            apps/api/pyproject.toml
            apps/api/uv.lock
            pyproject.toml

      - name: Install API deps
        working-directory: apps/api
        run: uv sync --dev

      - name: Run alembic upgrade head
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg://postgres:dev@localhost:5432/msft_engine
        run: uv run alembic upgrade head

      - name: Start uvicorn in background
        working-directory: apps/api
        env:
          JWT_SECRET: ci-jwt-secret-not-for-production
          DATABASE_URL: postgresql+psycopg://postgres:dev@localhost:5432/msft_engine
          GIT_SHA: ${{ github.sha }}
        # nohup + & + disown to fully detach uvicorn from the step's shell, so
        # the next step starts even though the server keeps running. The PID
        # leaks to a file so the cleanup step can kill it.
        run: |
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 \
            --log-level warning > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for /api/v1/health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/v1/health > /dev/null 2>&1; then
              echo "api up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "api never came up; uvicorn log:"
          cat /tmp/uvicorn.log || true
          exit 1

      - name: Smoke pytest (-m smoke)
        working-directory: apps/api
        env:
          SMOKE_API_URL: http://127.0.0.1:8000/api/v1
          # The smoke pytest process opens its own psycopg connection to
          # verify persisted rows and seed the test user — must point to
          # the SAME DB the uvicorn process writes to. Otherwise the
          # apps/api/tests/conftest.py default kicks in and routes to
          # msft_engine_test (which doesn't exist on this Postgres service).
          JWT_SECRET: ci-jwt-secret-not-for-production
          DATABASE_URL: postgresql+psycopg://postgres:dev@localhost:5432/msft_engine
        run: uv run pytest -m smoke

      - name: Stop uvicorn
        if: always()
        run: |
          if [[ -f /tmp/uvicorn.pid ]]; then
            kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true
          fi

      - name: Print uvicorn log on failure
        if: failure()
        run: cat /tmp/uvicorn.log || true
